<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevHub — Página no encontrada</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

    <!-- Tipografía Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: "Inter", system-ui, sans-serif;
            background: linear-gradient(135deg, #f3f7fc, #dfebf7);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e293b;
        }

        .card-404 {
            background: rgba(255, 255, 255, 0.72);
            border: 2px solid rgba(255, 255, 255, 0.85);
            border-radius: 32px;
            box-shadow:
                0 20px 40px rgba(122, 146, 179, 0.25),
                inset -6px -6px 12px rgba(255, 255, 255, 0.7),
                inset 6px 6px 12px rgba(165, 185, 212, 0.15);
            backdrop-filter: blur(12px);
            padding: 3rem;
            text-align: center;
            max-width: 460px;
            width: 90%;
        }

        .btn-back {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            color: #ffffff;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            padding: 0.85rem 2rem;
            font-size: 1rem;
            box-shadow:
                0 10px 20px rgba(79, 70, 229, 0.25),
                inset -4px -4px 8px rgba(0, 0, 0, 0.18),
                inset 4px 4px 8px rgba(255, 255, 255, 0.2);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            display: inline-block;
        }

        .btn-back:hover {
            transform: translateY(-2px);
            color: #ffffff;
        }
    </style>
</head>

<body>
    <div class="card-404">
        <div class="mb-3" style="font-size: 3.5rem" aria-hidden="true">🔍</div>
        <h1 class="h3 fw-bold mb-2">Página no encontrada</h1>
        <p class="text-muted mb-4">
            La ruta que buscas no existe en DevHub.
            Verifica la dirección o regresa al inicio.
        </p>
        <a id="back-link" href="index.html" class="btn-back">
            Volver al inicio
        </a>
    </div>

    <script>
        /*
         * Compatibilidad con GitHub Pages:
         * Si la URL contiene un hash de Supabase (access_token, recovery),
         * redirigir a index.html preservando el hash para que el SDK lo procese.
         */
        (function () {
            var hash = window.location.hash;
            if (hash && (hash.indexOf('access_token') !== -1 || hash.indexOf('type=recovery') !== -1)) {
                var basePath = window.location.pathname;
                if (basePath.indexOf('404.html') !== -1) {
                    basePath = basePath.replace('404.html', '');
                }
                window.location.replace(basePath + 'index.html' + hash);
            }
        })();
    </script>
</body>

</html>
